apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Gradle Plugin configuration
 */
react {
    /* Folders */
    // root = file("../")
    // reactNativeDir = file("../node_modules/react-native")
    // codegenDir = file("../node_modules/@react-native/codegen")
    // cliFile = file("../node_modules/react-native/cli.js")

    /* Variants */
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    // nodeExecutableAndArgs = ["node"]
    // bundleCommand = "ram-bundle"
    // bundleConfig = file(../rn-cli.config.js)
    // bundleAssetName = "MyApplication.android.bundle"
    // entryFile = file("../js/MyApplication.android.js")
    // extraPackagerArgs = []

    /* Hermes Commands */
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    // hermesFlags = ["-O", "-output-source-map"]
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.moviesstream"
    defaultConfig {
        applicationId "com.moviesstream"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // For CI builds we fall back to debug keystore so the APK can still be installed.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // === VECTOR ICONS FONT BUNDLING ===
    // Make src/main/assets an explicit source dir so any files dropped
    // there (including the copied .ttf fonts) get bundled into the APK.
    sourceSets {
        main {
            assets.srcDirs += ['src/main/assets']
        }
    }
}

// === COPY VECTOR-ICONS FONTS INTO ASSETS BEFORE BUILD ===
// Without this, react-native-vector-icons fonts are NOT included in
// release APKs (especially with Hermes), causing icons to render as
// [X] tofu boxes. This task runs before every mergeAssets step.
afterEvaluate {
    def copyIconFonts = tasks.create('copyIconFonts', Copy) {
        description = 'Copy react-native-vector-icons .ttf fonts into Android assets'
        group = 'react-native'
        from("../../node_modules/react-native-vector-icons/Fonts") {
            include '*.ttf'
        }
        into 'src/main/assets/fonts'
    }
    android.applicationVariants.all { variant ->
        variant.mergeAssetsProvider.get().dependsOn(copyIconFonts)
    }
}

// Top-level dependency configurations to force-resolve conflicts.
// androidx.core:core:1.16.0 (pulled in by some libraries) requires AGP 8.6+,
// but we're on AGP 8.2.1 (mandated by @react-native/gradle-plugin@0.74.85).
// We force-downgrade androidx.core to 1.13.1 which works with AGP 8.2.1.
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
        force 'androidx.activity:activity:1.8.2'
        force 'androidx.fragment:fragment:1.6.2'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    // Explicitly pin androidx.core to a version compatible with AGP 8.2.1
    implementation("androidx.core:core:1.13.1")
    implementation("androidx.core:core-ktx:1.13.1")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
