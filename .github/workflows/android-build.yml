name: Build Android Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: 'cache: npm' removed because we don't commit package-lock.json.

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verify Android SDK (preinstalled on runner)
        run: |
          echo "=== Android SDK location ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME 2>&1 | head -20 || true
          echo "=== Available platforms ==="
          ls $ANDROID_HOME/platforms 2>&1 || true
          echo "=== Available build-tools ==="
          ls $ANDROID_HOME/build-tools 2>&1 || true
          # Make sure we have API 35 platform + build-tools; if not, install.
          if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
            echo "Installing platforms;android-35..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" > /dev/null 2>&1 || true
          fi
          if [ ! -d "$ANDROID_HOME/build-tools/35.0.0" ]; then
            echo "Installing build-tools;35.0.0..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" > /dev/null 2>&1 || true
          fi
          echo "=== Final platforms ==="
          ls $ANDROID_HOME/platforms 2>&1 || true

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Print npm package versions
        run: |
          echo "=== Installed packages (depth=0) ==="
          npm list --depth=0 2>&1 || true
          echo "=== Critical packages for bundling ==="
          npm ls babel-plugin-module-resolver 2>&1 || true
          npm ls @react-native/babel-preset 2>&1 || true
          npm ls react-native-vector-icons 2>&1 || true

      - name: Generate debug keystore (used for release signing in CI)
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            echo "Generating debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore already exists."
          fi

      - name: Pre-build JavaScript bundle (production mode)
        run: |
          echo "=== Creating assets directory ==="
          mkdir -p android/app/src/main/assets
          echo "=== Running Metro bundler to generate index.android.bundle ==="
          # --dev false = production build (smaller, optimized)
          # This step is CRITICAL for standalone APKs — without it, the app
          # shows 'Unable to load script' on launch because it tries to
          # fetch the bundle from a Metro dev server that doesn't exist
          # on the user's phone.
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache
          echo "=== Bundle generated successfully ==="
          ls -lh android/app/src/main/assets/index.android.bundle
          echo "=== Bundle size: $(du -h android/app/src/main/assets/index.android.bundle | cut -f1) ==="

      - name: Verify Gradle installation
        run: |
          which gradle
          gradle --version

      - name: Build Release APK (signed with debug.keystore)
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: List built APKs
        if: always()
        run: |
          echo "=== Release APK ==="
          find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; || true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/.gradle/
          retention-days: 7
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## Release APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "✅ Release APK built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "   Path: android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release APK build failed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Build type: **Release only** (Debug build skipped)" >> $GITHUB_STEP_SUMMARY
          echo "- Signing: debug.keystore (CI temporary)" >> $GITHUB_STEP_SUMMARY
          echo "- JS Bundle: pre-built with \`--dev false\` (production mode)" >> $GITHUB_STEP_SUMMARY
          echo "- Vector Icons: copied via Gradle copyIconFonts task" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the Release APK from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
