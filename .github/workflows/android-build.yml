name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34'

      - name: Install dependencies
        run: npm install

      - name: Generate debug keystore (if missing)
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            echo "Generating debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore already exists."
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned / debug-signed)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: List built APKs
        run: |
          echo "=== Debug APK ==="
          find android/app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
          echo "=== Release APK ==="
          find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   Size: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Debug APK build failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "✅ Release APK built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Release APK not built (check logs)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download APKs from the Artifacts section at the bottom of this workflow run." >> $GITHUB_STEP_SUMMARY
