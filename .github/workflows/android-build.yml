name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: 'cache: npm' removed because we don't commit package-lock.json.
          # Caching is optional and not required for the build to succeed.

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Print npm package versions
        run: |
          echo "=== React Native CLI check ==="
          npx react-native --version 2>&1 || echo "react-native CLI does not support --version flag on this runner (expected)"
          echo "=== Installed packages (depth=0) ==="
          npm list --depth=0 2>&1 || true
          echo "=== Critical packages for bundling ==="
          npm ls babel-plugin-module-resolver 2>&1 || true
          npm ls @react-native/babel-preset 2>&1 || true

      - name: Generate debug keystore (if missing)
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            echo "Generating debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "debug.keystore already exists."
          fi

      - name: Pre-build JavaScript bundle (so APK runs without Metro server)
        run: |
          echo "=== Creating assets directory ==="
          mkdir -p android/app/src/main/assets
          echo "=== Running Metro bundler to generate index.android.bundle ==="
          # --dev false = production build (smaller, optimized)
          # This step is CRITICAL for standalone APKs (debug or release) —
          # without it, the app shows 'Unable to load script' on launch
          # because it tries to fetch the bundle from Metro dev server.
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache
          echo "=== Bundle generated successfully ==="
          ls -lh android/app/src/main/assets/index.android.bundle
          echo "=== Bundle size: $(du -h android/app/src/main/assets/index.android.bundle | cut -f1) ==="

      - name: Verify Gradle installation
        run: |
          which gradle
          gradle --version

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Build Release APK (debug-signed for CI)
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace
        continue-on-error: true
        id: release_build

      - name: List built APKs
        if: always()
        run: |
          echo "=== Debug APK ==="
          find android/app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \; || true
          echo "=== Release APK ==="
          find android/app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \; || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesstream-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesstream-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/.gradle/
          retention-days: 7
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   Size: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Debug APK build failed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "✅ Release APK built successfully" >> $GITHUB_STEP_SUMMARY
            echo "   Size: $(du -h android/app/build/outputs/apk/release/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Release APK not built (expected if minify/proguard issues)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download APKs from the Artifacts section at the bottom of this workflow run." >> $GITHUB_STEP_SUMMARY
